<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
<title id="t">Perché la Protezione Acquisti pesa di più sui prezzi bassi</title>
<desc id="d">Confronto visivo tra articoli da 5, 25 e 50 euro: la quota fissa della Protezione Acquisti incide di più sui prezzi bassi.</desc>
<rect width="1200" height="630" rx="36" fill="#f7f6f2"/>
<rect x="70" y="66" width="1060" height="498" rx="34" fill="#ffffff" stroke="#e6e0d4"/>
<text x="110" y="138" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="38" font-weight="800" fill="#1a1814">Sugli articoli economici pesa di più</text>
<text x="110" y="184" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="21" fill="#6b6a65">La quota fissa di 0,70€ conta molto di più su un articolo da 5€ che su uno da 50€.</text>
<g font-family="Plus Jakarta Sans,Arial,sans-serif">
  <rect x="110" y="244" width="290" height="210" rx="24" fill="#fff8e5" stroke="#f0d28a"/>
  <text x="145" y="295" font-size="24" font-weight="800" fill="#8a6d1e">Articolo da 5€</text>
  <text x="145" y="342" font-size="20" fill="#1a1814">Protezione stimata</text>
  <text x="145" y="398" font-size="62" font-weight="900" fill="#1a1814">0,95€</text>
  <text x="145" y="428" font-size="18" fill="#6b6a65">quasi 1€ su un prezzo molto basso</text>

  <rect x="455" y="244" width="290" height="210" rx="24" fill="#eef6f5" stroke="#9ccfd0"/>
  <text x="490" y="295" font-size="24" font-weight="800" fill="#01696f">Articolo da 25€</text>
  <text x="490" y="342" font-size="20" fill="#1a1814">Protezione stimata</text>
  <text x="490" y="398" font-size="62" font-weight="900" fill="#1a1814">1,95€</text>
  <text x="490" y="428" font-size="18" fill="#6b6a65">impatto molto più equilibrato</text>

  <rect x="800" y="244" width="290" height="210" rx="24" fill="#f9f8f5" stroke="#e6e0d4"/>
  <text x="835" y="295" font-size="24" font-weight="800" fill="#6b6a65">Articolo da 50€</text>
  <text x="835" y="342" font-size="20" fill="#1a1814">Protezione stimata</text>
  <text x="835" y="398" font-size="62" font-weight="900" fill="#1a1814">3,20€</text>
  <text x="835" y="428" font-size="18" fill="#6b6a65">la quota fissa pesa molto meno</text>

  <rect x="150" y="488" width="900" height="20" rx="10" fill="#ece8de"/>
  <rect x="150" y="488" width="260" height="20" rx="10" fill="#d9a93c"/>
  <rect x="150" y="488" width="530" height="20" rx="10" fill="#8ec7c8" opacity="0.9"/>
  <rect x="150" y="488" width="760" height="20" rx="10" fill="#01696f" opacity="0.9"/>
  <text x="150" y="538" font-size="18" fill="#6b6a65">Più il prezzo è basso, più la quota fissa incide sulla percezione del totale finale.</text>
</g>
</svg>