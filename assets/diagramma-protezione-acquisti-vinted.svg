<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">Anatomia del prezzo finale Vinted</title><desc id="d">Diagramma: prezzo articolo più Protezione Acquisti più spedizione formano il totale visto dall'acquirente.</desc><rect width="1200" height="630" rx="36" fill="#f7f6f2"/><rect x="70" y="66" width="1060" height="498" rx="34" fill="#ffffff" stroke="#e6e0d4"/><text x="110" y="138" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="38" font-weight="800" fill="#1a1814">Prezzo finale visto dall'acquirente</text><text x="110" y="184" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="21" fill="#6b6a65">La Protezione Acquisti non riduce direttamente il saldo del venditore, ma aumenta il totale al checkout.</text><g font-family="Plus Jakarta Sans,Arial,sans-serif"><rect x="110" y="250" width="275" height="170" rx="24" fill="#e0f0f0" stroke="#9ccfd0"/><text x="138" y="306" font-size="22" font-weight="800" fill="#01696f">Prezzo articolo</text><text x="138" y="370" font-size="54" font-weight="900" fill="#1a1814">25,00€</text><rect x="462" y="250" width="275" height="170" rx="24" fill="#fff8e5" stroke="#f0d28a"/><text x="490" y="306" font-size="22" font-weight="800" fill="#8a6d1e">Protezione Acquisti</text><text x="490" y="370" font-size="54" font-weight="900" fill="#1a1814">1,95€</text><text x="492" y="400" font-size="18" fill="#6b6a65">5% + 0,70€</text><rect x="815" y="250" width="205" height="170" rx="24" fill="#f9f8f5" stroke="#e6e0d4"/><text x="843" y="306" font-size="22" font-weight="800" fill="#6b6a65">Spedizione</text><text x="843" y="370" font-size="44" font-weight="900" fill="#1a1814">a parte</text><text x="406" y="344" font-size="42" font-weight="900" fill="#01696f">+</text><text x="759" y="344" font-size="42" font-weight="900" fill="#01696f">+</text><path d="M248 452 H918" stroke="#01696f" stroke-width="5" stroke-linecap="round"/><path d="M918 452 L897 439 M918 452 L897 465" stroke="#01696f" stroke-width="5" stroke-linecap="round"/><rect x="390" y="480" width="420" height="58" rx="29" fill="#01696f"/><text x="600" y="518" text-anchor="middle" font-size="22" font-weight="900" fill="white">Totale al checkout</text></g></svg>