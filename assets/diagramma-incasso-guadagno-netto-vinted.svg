<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">Incasso Vinted e guadagno netto</title><desc id="d">Diagramma: l'incasso Vinted è diverso dal guadagno netto perché dal prezzo vanno sottratti costi di acquisto, imballaggio, Bump e altri costi reali.</desc><rect width="1200" height="630" rx="36" fill="#f7f6f2"/><rect x="70" y="66" width="1060" height="498" rx="34" fill="#ffffff" stroke="#e6e0d4"/><text x="110" y="138" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="38" font-weight="800" fill="#1a1814">Incasso ≠ guadagno netto</text><text x="110" y="184" font-family="Plus Jakarta Sans,Arial,sans-serif" font-size="21" fill="#6b6a65">Il prezzo che imposti non racconta da solo quanto ti resta davvero.</text><g font-family="Plus Jakarta Sans,Arial,sans-serif"><rect x="110" y="250" width="270" height="180" rx="24" fill="#e0f0f0" stroke="#9ccfd0"/><text x="140" y="306" font-size="24" font-weight="800" fill="#01696f">Prezzo vendita</text><text x="140" y="374" font-size="58" font-weight="900" fill="#1a1814">30€</text><text x="410" y="354" font-size="48" font-weight="900" fill="#01696f">−</text><rect x="470" y="230" width="270" height="220" rx="24" fill="#f9f8f5" stroke="#e6e0d4"/><text x="500" y="286" font-size="23" font-weight="800" fill="#6b6a65">Costi reali</text><text x="500" y="332" font-size="21" fill="#1a1814">• acquisto</text><text x="500" y="370" font-size="21" fill="#1a1814">• imballaggio</text><text x="500" y="408" font-size="21" fill="#1a1814">• Bump/offerte</text><text x="770" y="354" font-size="48" font-weight="900" fill="#01696f">=</text><rect x="830" y="250" width="260" height="180" rx="24" fill="#fff8e5" stroke="#f0d28a"/><text x="860" y="306" font-size="24" font-weight="800" fill="#8a6d1e">Ti resta</text><text x="860" y="374" font-size="58" font-weight="900" fill="#1a1814">netto</text><rect x="160" y="480" width="880" height="58" rx="29" fill="#01696f"/><text x="600" y="518" text-anchor="middle" font-size="22" font-weight="900" fill="white">Per decidere prezzi e offerte, guarda il margine reale</text></g></svg>