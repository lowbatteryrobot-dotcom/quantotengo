<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Foto Vinted che proteggono il venditore</title>
  <desc id="desc">Schema con cinque foto utili per rendere un annuncio Vinted più chiaro: prima foto, difetti, etichetta, misure e imballaggio.</desc>
  <rect width="1200" height="630" rx="36" fill="#f7f2e8"/>
  <rect x="72" y="58" width="1056" height="514" rx="34" fill="#ffffff" stroke="#e6dcc8"/>
  <g font-family="Plus Jakarta Sans, Arial, sans-serif">
    <text x="112" y="128" font-size="38" font-weight="800" fill="#1a1814">Foto Vinted che proteggono il venditore</text>
    <text x="112" y="172" font-size="21" fill="#6b6a65">Mostrare bene non significa nascondere difetti: significa ridurre dubbi, trattative e ambiguità.</text>
    <rect x="112" y="214" width="976" height="288" rx="26" fill="#f9f8f5" stroke="#e8e0d0"/>
    <g font-size="22" font-weight="800" fill="#1a1814">
      <circle cx="158" cy="264" r="17" fill="#01696f"/><path d="M150 264 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="192" y="272">Prima foto chiara</text><text x="520" y="272" font-size="18" font-weight="500" fill="#6b6a65">fronte, luce naturale, sfondo pulito</text>
      <circle cx="158" cy="316" r="17" fill="#01696f"/><path d="M150 316 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="192" y="324">Difetti visibili</text><text x="520" y="324" font-size="18" font-weight="500" fill="#6b6a65">macchie, pilling, segni, cuciture</text>
      <circle cx="158" cy="368" r="17" fill="#01696f"/><path d="M150 368 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="192" y="376">Etichetta e composizione</text><text x="520" y="376" font-size="18" font-weight="500" fill="#6b6a65">marca, taglia, materiale, istruzioni</text>
      <circle cx="158" cy="420" r="17" fill="#01696f"/><path d="M150 420 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="192" y="428">Misure con metro</text><text x="520" y="428" font-size="18" font-weight="500" fill="#6b6a65">spalle, torace, vita, lunghezza</text>
      <circle cx="158" cy="472" r="17" fill="#01696f"/><path d="M150 472 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="192" y="480">Imballaggio prima dell'invio</text><text x="520" y="480" font-size="18" font-weight="500" fill="#6b6a65">foto semplice prima di spedire</text>
    </g>
    <rect x="112" y="518" width="488" height="42" rx="21" fill="#01696f"/>
    <text x="356" y="546" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff">Annuncio più chiaro, meno sorprese</text>
  </g>
</svg>